esphome:
  name: gledopto-node

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.0.110
    gateway: 192.168.0.1
    subnet: 255.255.255.0

logger:

web_server:
  port: 80

api:

ota:
  platform: esphome
  password: !secret ota_password

captive_portal:

sensor:
  - platform: adc
    pin: GPIO36
    id: sound_level
    name: "Sound Level"
    update_interval: 50ms
    filters:
      - multiply: 3.3

light:
  - platform: fastled_clockless
    chipset: WS2812
    pin: GPIO16
    num_leds: 300
    name: "Gledopto LED Strip"
    id: gledopto_led_strip
    effects:
      - random:
          name: "Random"
      - strobe:
          name: "Strobe"
      - pulse:
          name: "Pulse"
      - addressable_rainbow:
          name: "Rainbow"
      - addressable_color_wipe:
          name: "Color Wipe"
      - addressable_twinkle:
          name: "Twinkle"
      - addressable_scan:
          name: "Scan"
      - addressable_fireworks:
          name: "Fireworks"
      - addressable_flicker:
          name: "Flicker"
      - addressable_lambda:
          name: "Techno Lightning"
          update_interval: 10ms
          lambda: |-
            static int cooldown = 0;
            static int strike_pos = 0;
            static int strike_len = 0;

            float level = id(sound_level).state;

            if (level > 0.6 && cooldown == 0) {
              strike_pos = random(0, it.size());
              strike_len = random(5, 40);
              cooldown = 5;
            }

            if (cooldown > 0) {
              for (int i = strike_pos; i < strike_pos + strike_len && i < it.size(); i++) {
                it[i] = CRGB(255, 255, 255);
              }
              cooldown--;
            } else {
              for (int i = 0; i < it.size(); i++) {
                it[i].fadeToBlackBy(20);
              }
            }

status_led:
  pin: GPIO2

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: "Reset Button"
    on_press:
      - switch.toggle: restart_switch

switch:
  - platform: restart
    name: "Restart Controller"
    id: restart_switch
