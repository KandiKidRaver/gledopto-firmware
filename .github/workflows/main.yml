name: ESPHome Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install ESPHome
        run: pip install esphome
      
      - name: Compile ESPHome firmware
        run: esphome compile gledopto_node.yaml
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esphome-build
          path: .esphome/build/
          retention-days: 30
